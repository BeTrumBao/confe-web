<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Không Tìm Thấy Trang</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root {
            --accent-1: #2563eb;
            --text-dark: #0f172a;
            --gray: #64748b;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-color: #f8fafc;
            padding: 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            box-sizing: border-box;
        }

        .error-container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: var(--accent-1);
            line-height: 1;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
        }

        .error-icon {
            font-size: 60px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .error-msg {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent-1);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-home:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-container">
        <span class="material-symbols-rounded error-icon" style="font-size: 60px;">skull</span>

        <div class="error-code">404</div>
        <h1 class="error-title">Oops! Hỏng đường link rồi!</h1>
        <p class="error-msg">Trang bạn đang tìm kiếm dường như đã bay màu hoặc không hề tồn tại trên hệ thống. Trở về
            trang chủ nhé?</p>
        <a href="index.html" class="btn-home"><span class="material-symbols-rounded">home</span> Về Trang Chủ</a>

    </div>

    <!-- Security Enhancements -->
    <script>
        window.escapeHTML = function(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, function(tag) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag];
            });
        };
    </script>
</body>

</html>
