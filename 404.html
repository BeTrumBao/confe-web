<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Không Tìm Thấy Trang</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --accent-1: #2563eb;
            --text-dark: #0f172a;
            --gray: #64748b;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-color: #f8fafc;
            padding: 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            box-sizing: border-box;
        }

        .error-container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: var(--accent-1);
            line-height: 1;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
        }

        .error-icon {
            font-size: 60px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .error-msg {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent-1);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-home:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-container">
        <i class='bx bx-ghost error-icon'></i>
        <div class="error-code">404</div>
        <h1 class="error-title">Oops! Hỏng đường link rồi!</h1>
        <p class="error-msg">Trang bạn đang tìm kiếm dường như đã bay màu hoặc không hề tồn tại trên hệ thống. Trở về
            trang chủ nhé?</p>
        <a href="index.html" class="btn-home"><i class='bx bx-home-alt'></i> Về Trang Chủ</a>
    </div>

    <!-- Security Enhancements -->
    <script>
        window.escapeHTML = function(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, function(tag) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag];
            });
        };
        document.addEventListener('contextmenu', function(e) {
            if (window.currentUser && window.currentUser.uid === 'kG1yhV2iOZWslQACnjHIOyzmjBJ2') return true;
            e.preventDefault();
        });
        document.onkeydown = function(e) {
            if (window.currentUser && window.currentUser.uid === 'kG1yhV2iOZWslQACnjHIOyzmjBJ2') return true;
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        };
        (function() {
            setInterval(function() {
                if (window.currentUser && window.currentUser.uid === 'kG1yhV2iOZWslQACnjHIOyzmjBJ2') return;
                var before = new Date().getTime();
                debugger;
                var after = new Date().getTime();
                if (after - before > 100) {
                    document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; flex-direction:column;'><h1 style='font-size:40px;'>&#9888;&#65039; C&#7843;nh B&#225;o</h1><p style='font-size:18px; color:#64748b; margin-top:10px;'>Vui l&#242;ng kh&#244;ng s&#7917; d&#7909;ng Developer Tools (F12) tr&#234;n tr&#236;nh duy&#7879;t n&#224;y.</p></div>";
                }
            }, 1000);
        })();
    </script>
</body>

</html>
