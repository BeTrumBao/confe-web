    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root {
            --primary: #0084ff;
            --primary-bg: #f1f7ff;
            --bg-body: #ffffff;
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --accent: #7c3aed;
            --glass: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: transparent;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .engine-container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Quiz Block --- */
        .q-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1.5px solid #e2e8f0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .q-num {
            background: var(--primary);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(0, 132, 255, 0.3);
        }

        .q-type-badge {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }

        .q-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #334155;
        }

        /* --- Media --- */
        .q-media-wrap {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1.5px solid #e2e8f0;
            margin-bottom: 20px;
            background: #0f172a;
        }

        .q-media-wrap img { width: 100%; display: block; }

        .mask-overlay {
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .mask-overlay:hover { background: rgba(15, 23, 42, 0.85); }
        .mask-overlay.revealed { opacity: 0; pointer-events: none; transform: scale(0.95); }

        /* --- MCQ Options --- */
        .options-list {
            display: grid;
            gap: 12px;
        }

        .mcq-btn {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 18px;
            text-align: left;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mcq-btn:hover:not(:disabled) {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.1);
        }

        .mcq-btn .opt-char {
            width: 25px;
            height: 25px;
            border-radius: 8px;
            background: var(--primary-bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
        }

        .mcq-btn.correct {
            background: #ecfdf5;
            border-color: #10b981;
            color: #065f46;
        }
        .mcq-btn.wrong {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }

        /* --- Essay Input --- */
        .essay-wrap {
            display: flex;
            gap: 10px;
        }

        .input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 18px;
            border: 2.5px solid #e2e8f0;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 5px var(--primary-bg);
        }

        .btn-send {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 132, 255, 0.3);
        }

        .btn-send:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- Feedback --- */
        .feedback {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } }

        .feedback.success { background: #ecfdf5; color: #059669; display: flex; align-items: center; gap: 8px; }
        .feedback.error { background: #fef2f2; color: #ef4444; display: flex; align-items: center; gap: 8px; }

        /* --- Loader --- */
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--primary-bg);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .btn-nav {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-exit { background: #f1f5f9; color: #475569; }
        .btn-exit:hover { background: #e2e8f0; }

        /* --- Subject Hub UI --- */
        .hub-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-stats {
            display: flex;
            gap: 15px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .stat-item span { font-size: 16px; color: var(--primary); }

        .mode-bar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            scrollbar-width: none;
        }
        .mode-bar::-webkit-scrollbar { display: none; }

        .mode-btn {
            white-space: nowrap;
            padding: 10px 18px;
            border-radius: 15px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(0, 132, 255, 0.3); }
        .mode-btn:not(.active) { background: #f1f5f9; color: #64748b; }

        /* -- Match Mode -- */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .match-card {
            aspect-ratio: 1/1.2;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .match-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .match-card.selected { background: var(--primary-bg); border-color: var(--primary); color: var(--primary); }
        .match-card.hidden { opacity: 0; pointer-events: none; }

        /* -- Memory Mode -- */
        .memory-wrap {
            max-width: 500px;
            margin: 40px auto;
            perspective: 1000px;
        }
        .flashcard {
            width: 100%;
            height: 350px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 30px;
            background: white;
            border: 2px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card-back { transform: rotateY(180deg); background: var(--primary-bg); border-color: var(--primary); }

        .memory-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .q-mode-header {
            padding: 40px 30px;
            border-radius: 35px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* --- Solo BO3 & Shop UI --- */
        .solo-lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease;
        }

        .solo-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f1f5f9;
        }

        .solo-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: 0.3s;
        }
        .solo-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .room-code-input {
            padding: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        .room-code-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-bg); }

        .progress-area {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        .p-bar-wrap { margin-bottom: 12px; }
        .p-label { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px; font-size: 13px; }
        .p-bar { height: 10px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .p-fill { height: 100%; transition: width 0.4s ease; }

        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin: 40px 0;
            height: 200px;
        }
        .podium-item { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .podium-avatar { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 5px; }
        .podium-base { width: 100%; border-radius: 10px 10px 0 0; }
        .first .podium-base { height: 100px; background: #fbbf24; }
        .second .podium-base { height: 70px; background: #94a3b8; }
        .third .podium-base { height: 50px; background: #cd7f32; }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .shop-item {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .shop-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .item-icon { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        .item-name { font-weight: 800; font-size: 16px; margin-bottom: 10px; }
        .item-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
        .item-price { font-weight: 800; color: #059669; font-size: 15px; margin-bottom: 20px; }

        /* -- Quiz Item Buttons -- */
        .quiz-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tool-btn {
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool-btn:hover:not(:disabled) { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
        .tool-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 25px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease-out;
        }
        @keyframes toastIn { from { bottom: 0; opacity: 0; } }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .hub-header { padding: 10px 15px; padding-right: 70px; }
            .user-stats { gap: 8px; font-size: 11px; }
            .stat-item { padding: 4px 8px; border-radius: 8px; }
            .stat-item span { font-size: 14px; }
            .q-card { padding: 20px; border-radius: 20px; margin-bottom: 20px; }
            .q-text { font-size: 16px; margin-bottom: 15px; }
            .mcq-btn { padding: 14px 16px; border-radius: 14px; font-size: 14px; }
            .essay-wrap { flex-direction: column; }
            .btn-send { width: 100%; height: 50px; }
            .btn-nav { padding: 15px; font-size: 14px; }
            .achievement-overlay .achievement-text { font-size: 32px !important; }
            .flashcard { height: 280px; }
            .card-face { padding: 20px; border-radius: 20px; }
            .q-mode-header { padding: 25px 20px; border-radius: 20px; }
            .q-media-wrap img { max-height: 250px; object-fit: contain; background: #000; }
        }
        </style>

            nextBtn.className = 'solo-btn';
            nextBtn.style.display = 'none';
            nextBtn.style.marginTop = '20px';
            nextBtn.style.width = '100%';
            nextBtn.innerHTML = `Tiáº¿p theo <span class="material-symbols-rounded">arrow_forward</span>`;
            nextBtn.onclick = () => {
                quizIdx++;
                renderMode();
            };
            root.appendChild(nextBtn);
        }


        function renderMatchMode(root) {
            root.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-secondary);">Cháº¿ Ä‘á»™ nÃ y Ä‘Ã£ bá»‹ gá»¡ bá».</div>`;
        }

        function renderSoloMode(root) {
            root.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-secondary);">Cháº¿ Ä‘á»™ nÃ y Ä‘Ã£ bá»‹ gá»¡ bá».</div>`;
        }

        window.submitSoloAns = () => {};
        window.exitSoloRoom = () => {};

        window.checkAnswer = (idx, val, correct, isV2 = false, subIdx = -1) => {
            const isCorrect = isV2 ? (parseInt(val) === parseInt(correct)) : (String(val).toUpperCase() === String(correct).toUpperCase());
            const feedbackId = subIdx === -1 ? `fb-${idx}` : `fb-${idx}-${subIdx}`;
            const inputId = subIdx === -1 ? `q-input-${idx}` : `q-input-${idx}-${subIdx}`;
            
            const fb = document.getElementById(feedbackId);
            const btns = document.querySelectorAll(`#${inputId} .mcq-btn`);
            btns.forEach(b => b.disabled = true);

            if (isCorrect) {
                fb.className = 'feedback success';
                fb.innerHTML = 'ChÃ­nh xÃ¡c!';
                syncStats();
                const nextBtn = document.getElementById('btn-next-q');
                if (nextBtn) nextBtn.style.display = 'block';
            } else {
                fb.className = 'feedback error';
                fb.innerHTML = `Sai rá»“i. ÄÃ¡p Ã¡n lÃ  ${isV2 ? String.fromCharCode(65 + correct) : correct} <br><button onclick="window.renderMode()" class="solo-btn" style="margin-top:10px; background:#f59e0b; padding:8px 15px; font-size:14px; border:none; cursor:pointer; color:white; border-radius:12px;"><span class="material-symbols-rounded" style="font-size:16px; vertical-align:middle;">refresh</span> LÃ m láº¡i cÃ¢u nÃ y</button>`;
                sessionWrongIndices.add(idx);
            }
        };

        window.checkEssay = (idx, correct, subIdx = -1) => {
            const inputFieldId = subIdx === -1 ? `inp-${idx}` : `inp-${idx}-${subIdx}`;
            const feedbackId = subIdx === -1 ? `fb-${idx}` : `fb-${idx}-${subIdx}`;
            
            const inp = document.getElementById(inputFieldId);
            const fb = document.getElementById(feedbackId);
            const val = inp.value.trim().toLowerCase();
            if (!val) return;
            inp.disabled = true;

            if (val === String(correct).toLowerCase()) {
                fb.className = 'feedback success';
                fb.innerHTML = 'QuÃ¡ chuáº©n!';
                syncStats();
                const nextBtn = document.getElementById('btn-next-q');
                if (nextBtn) nextBtn.style.display = 'block';
            } else {
                fb.className = 'feedback error';
                fb.innerHTML = `ChÆ°a Ä‘Ãºng. ÄÃ¡p Ã¡n: ${correct} <br><button onclick="window.renderMode()" class="solo-btn" style="margin-top:10px; background:#f59e0b; padding:8px 15px; font-size:14px; border:none; cursor:pointer; color:white; border-radius:12px;"><span class="material-symbols-rounded" style="font-size:16px; vertical-align:middle;">refresh</span> LÃ m láº¡i cÃ¢u nÃ y</button>`;
                sessionWrongIndices.add(idx);
            }
        };

        window.moveWord = (qIdx, btn) => {
            const pool = document.getElementById(`arrange-pool-${qIdx}`);
            const ans = document.getElementById(`arrange-ans-${qIdx}`);
            if (btn.parentElement === pool) ans.appendChild(btn);
            else pool.appendChild(btn);
        };

        window.checkArrange = (idx, correct) => {
            const ansDiv = document.getElementById(`arrange-ans-${idx}`);
            const fb = document.getElementById(`fb-${idx}`);
            const btns = ansDiv.querySelectorAll('button');
            const userStr = Array.from(btns).map(b => b.textContent).join(' ');
            
            if (userStr === correct) {
                fb.className = 'feedback success';
                fb.innerHTML = 'Tuyá»‡t vá»i!';
                syncStats();
            } else {
                fb.className = 'feedback error';
                fb.innerHTML = `ChÆ°a Ä‘Ãºng. HÃ£y thá»­ láº¡i!`;
                sessionWrongIndices.add(idx);
            }
            if (userStr !== correct) setTimeout(() => { fb.style.display = 'none'; fb.className = 'feedback'; }, 3000);
        };

        function showError(msg) {
            const root = document.getElementById('engine-root');
            root.innerHTML = `<div style="text-align:center; padding:50px 20px; color:#ef4444;"><h2 style="font-weight:800;">Oops!</h2><p>${msg}</p></div>`;
        }
    </script>
