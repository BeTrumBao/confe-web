<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Room Blue</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* BLUE THEME - TO & RÕ */
            --primary: #0084ff; /* Xanh Messenger */
            --primary-light: #e7f3ff;
            --bg: #ffffff;
            --surface: #f0f2f5;
            --text-main: #050505;
            --text-sub: #65676b;
            --bubble-mine: #0084ff;
            --text-mine: #ffffff;
            --bubble-theirs: #e4e6eb;
            --text-theirs: #050505;
            
            --radius-bubble: 24px; /* Bo tròn to hơn */
            --font-size-msg: 17px; /* Chữ to hơn */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER BLUE */
        .chat-header {
            background: var(--bg);
            padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid #ddd;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-icon {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: transparent; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-icon:hover { background: var(--surface); }
        .btn-icon svg { width: 28px; height: 28px; fill: currentColor; }

        .header-info { flex: 1; }
        .header-title { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
        .header-status { font-size: 14px; color: #31a24c; display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .status-dot { width: 10px; height: 10px; background: #31a24c; border-radius: 50%; }

        /* CHAT AREA */
        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--bg);
            scroll-behavior: smooth;
        }

        .msg-row { display: flex; align-items: flex-end; gap: 12px; max-width: 85%; animation: slideIn 0.2s ease-out; }
        .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-avt { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; flex-shrink: 0; }
        
        .msg-content { display: flex; flex-direction: column; gap: 5px; }
        
        .msg-name { font-size: 13px; color: var(--text-sub); margin-left: 12px; margin-bottom: 2px; font-weight: 500; }
        .msg-row.mine .msg-name { display: none; }

        .msg-bubble {
            padding: 12px 18px; 
            border-radius: var(--radius-bubble); 
            font-size: var(--font-size-msg); 
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        /* Màu sắc tin nhắn */
        .msg-row.theirs .msg-bubble { 
            background: var(--bubble-theirs); 
            color: var(--text-theirs); 
            border-bottom-left-radius: 6px; 
        }
        .msg-row.mine .msg-bubble { 
            background: var(--bubble-mine); 
            color: var(--text-mine); 
            border-bottom-right-radius: 6px; 
        }

        /* TRẠNG THÁI GỬI (MỚI) */
        .msg-status {
            font-size: 11px; color: var(--text-sub); 
            text-align: right; margin-right: 5px; margin-top: 2px;
            display: flex; align-items: center; justify-content: flex-end; gap: 4px;
        }
        .msg-status svg { width: 12px; height: 12px; fill: var(--primary); }

        /* Ảnh trong tin nhắn */
        .msg-img { 
            max-width: 250px; 
            border-radius: 16px; 
            margin-top: 5px; 
            border: 1px solid rgba(0,0,0,0.1); 
            display: block; cursor: zoom-in;
        }

        /* INPUT AREA - TO HƠN */
        .input-container {
            background: var(--bg);
            padding: 10px 15px;
            display: flex; align-items: flex-end; gap: 10px;
            border-top: 1px solid #eee;
        }
        
        .preview-box {
            position: absolute; bottom: 90px; left: 20px; 
            background: white; padding: 10px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none; animation: popUp 0.2s; border: 1px solid #eee;
        }
        .preview-box.show { display: block; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; }
        .btn-close-preview { 
            position: absolute; top: -8px; right: -8px; 
            background: var(--text-sub); color: white;
            width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer;
            font-weight: bold;
        }

        .inp-wrapper {
            flex: 1; background: var(--surface);
            border-radius: 30px; display: flex; align-items: center;
            padding: 8px 8px 8px 20px;
            border: 1px solid transparent; transition: 0.2s;
        }
        .inp-wrapper:focus-within { background: #f0f8ff; border-color: var(--primary); }
        
        .inp {
            flex: 1; border: none; outline: none; 
            background: transparent; font-size: 16px; 
            max-height: 120px; padding: 5px 0; color: var(--text-main);
        }

        .btn-attach {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary); margin-right: 5px;
        }
        .btn-attach:hover { background: rgba(0, 132, 255, 0.1); }

        .btn-send {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 132, 255, 0.3);
        }
        .btn-send:disabled { background: var(--text-sub); opacity: 0.5; box-shadow: none; }
        .btn-send svg { width: 24px; height: 24px; fill: currentColor; margin-left: 3px; }

        /* Fullscreen Image Viewer */
        .modal-img {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .modal-img.active { display: flex; }
        .full-img { max-width: 100%; max-height: 100%; }
        .close-img { position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 30px; cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="chat-header">
        <button class="btn-icon" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div class="header-info">
            <div class="header-title">Chat Cộng Đồng 💬</div>
            <div class="header-status"><div class="status-dot"></div> Đang hoạt động</div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div style="text-align:center; padding: 40px; color: var(--text-sub); font-size:14px;">
            Hế lô! Chat vui vẻ, cấm chửi bậy nha. 👇
        </div>
    </div>

    <div id="previewBox" class="preview-box">
        <button class="btn-close-preview" onclick="clearImage()">×</button>
        <img id="imgPreview" class="preview-img">
    </div>

    <div class="input-container">
        <div class="inp-wrapper">
            <input type="text" id="msgInput" class="inp" placeholder="Nhập tin nhắn..." autocomplete="off">
            
            <label class="btn-attach">
                <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </label>
        </div>
        <button id="btnSend" class="btn-send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <div id="modalImg" class="modal-img">
        <button class="close-img" onclick="document.getElementById('modalImg').classList.remove('active')">×</button>
        <img id="fullImg" class="full-img">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const cfg = { apiKey: "AIzaSyBPEMno1uZFg4uVXZjz-PbBR37gH6-3t5Y", authDomain: "confe-web.firebaseapp.com", projectId: "confe-web", storageBucket: "confe-web.firebasestorage.app", messagingSenderId: "677778119372", appId: "1:677778119372:web:ee3f1132871332743b0069" };
        const IMG_KEY = "e6c2724ff8344c073410da4876c3d35f";

        const app = initializeApp(cfg); const auth = getAuth(app); const db = getFirestore(app);
        let currentUser = null;
        let selectedFile = null;
        const ANON_AVATAR = "https://www.galeriemichael.com/wp-content/uploads/2025/07/anh-meme-meo-cuoi.jpg";

        // --- AUTH CHECK ---
        onAuthStateChanged(auth, async (u) => {
            if(!u) {
                if(confirm("Bạn cần đăng nhập để chat!")) window.location.href = 'login.html';
                else window.location.href = 'index.html';
                return;
            }
            currentUser = u;
            const uDoc = await getDoc(doc(db, "users", u.uid));
            if(uDoc.exists()) currentUser.photoURL = uDoc.data().photoURL || ANON_AVATAR;
            else currentUser.photoURL = ANON_AVATAR;
            loadMessages();
        });

        // --- IMAGE HANDLING ---
        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = (e) => {
            if(e.target.files[0]) {
                selectedFile = e.target.files[0];
                document.getElementById('imgPreview').src = URL.createObjectURL(selectedFile);
                document.getElementById('previewBox').classList.add('show');
            }
        }
        window.clearImage = () => {
            selectedFile = null;
            fileInput.value = "";
            document.getElementById('previewBox').classList.remove('show');
        }

        async function uploadImage(file) {
            const formData = new FormData(); formData.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMG_KEY}`, { method: "POST", body: formData });
                const data = await res.json();
                return data.data.url;
            } catch { return null; }
        }

        // --- SEND MESSAGE ---
        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            
            if(!text && !selectedFile) return;

            const btn = document.getElementById('btnSend');
            btn.disabled = true; 

            let imgUrl = "";
            if (selectedFile) {
                imgUrl = await uploadImage(selectedFile);
                clearImage();
            }
            inp.value = '';
            inp.focus();

            try {
                await addDoc(collection(db, "public_chat"), {
                    text: text,
                    image: imgUrl,
                    uid: currentUser.uid,
                    name: currentUser.displayName || currentUser.email.split('@')[0],
                    avatar: currentUser.photoURL,
                    createdAt: serverTimestamp()
                });
            } catch(e) { console.error(e); }
            
            btn.disabled = false;
        }

        document.getElementById('btnSend').onclick = sendMessage;
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // --- LOAD MESSAGES ---
        function loadMessages() {
            const q = query(collection(db, "public_chat"), orderBy("createdAt", "asc"), limit(50));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = ''; 
                
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const isMine = msg.uid === currentUser.uid;
                    const rowClass = isMine ? 'mine' : 'theirs';
                    
                    let imgHtml = msg.image ? `<img src="${msg.image}" class="msg-img" onclick="window.viewImg('${msg.image}')">` : '';
                    let textHtml = msg.text ? `<div class="msg-bubble">${msg.text}</div>` : '';
                    
                    // TRẠNG THÁI: Nếu là tin của mình thì hiện "Đã gửi"
                    let statusHtml = isMine ? `
                        <div class="msg-status">
                            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 
                            Đã gửi
                        </div>` : '';

                    const html = `
                        <div class="msg-row ${rowClass}">
                            ${!isMine ? `<img src="${msg.avatar || ANON_AVATAR}" class="msg-avt">` : ''}
                            <div class="msg-content">
                                ${!isMine ? `<div class="msg-name">${msg.name}</div>` : ''}
                                ${imgHtml}
                                ${textHtml}
                                ${statusHtml}
                            </div>
                        </div>
                    `;
                    box.insertAdjacentHTML('beforeend', html);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.viewImg = (src) => {
            document.getElementById('fullImg').src = src;
            document.getElementById('modalImg').classList.add('active');
        }
    </script>
</body>
</html>
