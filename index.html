<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confe</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m3-primary: #00639b;
            --m3-on-primary: #ffffff;
            --m3-surface: #f0f4f9; /* Màu nền xám xanh M3 */
            --m3-surface-container: #ffffff;
            --m3-outline: #747775;
            --radius-xl: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--m3-surface); 
            color: #1a1c1e;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            height: 70px;
            padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            background: rgba(240, 244, 249, 0.9); /* Trong suốt mờ */
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--m3-primary); text-decoration: none; }
        
        .nav-actions { display: flex; align-items: center; gap: 10px; }
        
        .btn-icon {
            width: 45px; height: 45px; border: none; background: transparent;
            border-radius: 50%; cursor: pointer; color: #444746;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-icon:hover { background: #e0e2e5; }

        .user-avt {
            width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* --- MAIN CONTENT --- */
        .container {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; /* Căn giữa dọc & ngang */
            padding: 20px;
            width: 100%;
        }

        .hero-text {
            text-align: center; margin-bottom: 40px;
        }
        .hero-text h1 { font-size: 32px; font-weight: 700; color: #1f1f1f; margin-bottom: 8px; }
        .hero-text p { color: #5e6066; font-size: 15px; }

        /* --- SLIDER NGANG (Horizontal Scroll) --- */
        .scroll-wrapper {
            width: 100%;
            display: flex;
            justify-content: center; /* Căn giữa nếu màn hình to */
        }

        .horizontal-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto; /* Cho phép cuộn ngang */
            padding: 20px 20px 50px 20px; /* Padding dưới để bóng đổ đẹp */
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Ẩn thanh cuộn Firefox */
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
            max-width: 1200px; /* Giới hạn chiều rộng trên PC */
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; /* Ẩn thanh cuộn Chrome */ }

        /* --- CARD STYLE (M3) --- */
        .card-m3 {
            flex: 0 0 auto; /* KHÔNG CO GIÃN - Giữ nguyên kích thước để scroll */
            width: 280px; height: 350px;
            background: linear-gradient(180deg, #00639b 0%, #004a77 100%);
            border-radius: var(--radius-xl);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: center;
            transition: transform 0.3s cubic-bezier(0.3, 0, 0, 1), box-shadow 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-m3:active { transform: scale(0.95); }
        .card-m3:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0, 99, 155, 0.4); }

        /* Số nền to phía sau */
        .bg-number {
            position: absolute; top: -20px; right: -20px;
            font-size: 180px; font-weight: 900;
            color: rgba(255,255,255,0.08);
            line-height: 1; pointer-events: none;
        }

        /* Icon tròn nổi */
        .float-icon {
            position: absolute; top: 24px; left: 24px;
            width: 56px; height: 56px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-info h3 { font-size: 28px; font-weight: 800; color: white; margin-bottom: 4px; }
        .card-info p { font-size: 14px; color: rgba(255,255,255,0.8); font-weight: 500; }
        
        .pill {
            margin-top: 12px;
            display: inline-block;
            padding: 6px 14px;
            background: white;
            color: var(--m3-primary);
            border-radius: 100px;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase;
        }

        /* --- FOOTER --- */
        footer { padding: 30px; text-align: center; color: var(--m3-outline); font-size: 13px; margin-top: auto; }
        
        /* Modal User */
        .dropdown { position: absolute; top: 70px; right: 20px; background: white; width: 200px; padding: 8px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; animation: fadeIn 0.2s; z-index: 200; }
        .dropdown.show { display: block; }
        .menu-item { display: flex; padding: 12px; color: #1f1f1f; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .menu-item:hover { background: #f0f4f9; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">Confe</a>
        <div class="nav-actions">
            <button class="btn-icon"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg></button>
            <div id="authBox">
                <a href="login.html" style="text-decoration:none; background:#00639b; color:white; padding:10px 20px; border-radius:100px; font-weight:600; font-size:14px;">Đăng nhập</a>
            </div>
        </div>
        
        <div id="userDropdown" class="dropdown">
            <div id="btnLogout" class="menu-item" style="color:#ba1a1a;">Đăng xuất</div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-text">
            <h1>Góc Học Tập</h1>
            <p>Chọn khối lớp để xem tài liệu & trao đổi</p>
        </div>

        <div class="scroll-wrapper">
            <div id="slider" class="horizontal-scroll">
                </div>
        </div>
    </div>

    <footer>
        Made with by Bảo Neyako with Love <3
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp({ apiKey: "AIzaSyBPEMno1uZFg4uVXZjz-PbBR37gH6-3t5Y", authDomain: "confe-web.firebaseapp.com", projectId: "confe-web" });
        const auth = getAuth(app); const db = getFirestore(app);

        // DATA: Đã bỏ chữ Confession
        const DATA = [
            { id: 'cfs9', num: '9', title: 'Khối 9', desc: 'Tài liệu & Hỏi đáp Lớp 9' },
            { id: 'cfs8', num: '8', title: 'Khối 8', desc: 'Tài liệu & Hỏi đáp Lớp 8' },
            { id: 'cfs7', num: '7', title: 'Khối 7', desc: 'Tài liệu & Hỏi đáp Lớp 7' },
            { id: 'cfs6', num: '6', title: 'Khối 6', desc: 'Tài liệu & Hỏi đáp Lớp 6' }
        ];

        // HÀM CLICK LẤY ID NHƯ YÊU CẦU
        window.handleClick = (id) => {
            console.log("Đã lấy được ID:", id); // Check console để thấy ID
            // Chuyển hướng kèm ID
            location.href = `detail.html?tid=${id}`;
        }

        // RENDER GIAO DIỆN
        const slider = document.getElementById('slider');
        slider.innerHTML = DATA.map(item => `
            <div class="card-m3" onclick="handleClick('${item.id}')">
                <div class="bg-number">${item.num}</div>
                <div class="float-icon">${item.num}</div>
                
                <div class="card-info">
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <span class="pill">Truy cập ngay</span>
                </div>
            </div>
        `).join('');

        // XỬ LÝ ĐĂNG NHẬP
        onAuthStateChanged(auth, async (u) => {
            const box = document.getElementById('authBox');
            if(u) {
                let img = "https://via.placeholder.com/40";
                try { const s = await getDoc(doc(db,"users",u.uid)); if(s.exists()) img = s.data().photoURL || img; } catch{}
                
                box.innerHTML = `<img src="${img}" class="user-avt" onclick="document.getElementById('userDropdown').classList.toggle('show')">`;
                
                document.getElementById('btnLogout').onclick = () => signOut(auth).then(()=>location.reload());
            } else {
                box.innerHTML = `<a href="login.html" style="text-decoration:none; background:#00639b; color:white; padding:10px 20px; border-radius:100px; font-weight:600; font-size:14px;">Đăng nhập</a>`;
            }
        });

        // Đóng menu khi click ra ngoài
        window.onclick = (e) => {
            if(!e.target.closest('#authBox') && !e.target.closest('#userDropdown')) {
                document.getElementById('userDropdown')?.classList.remove('show');
            }
        }
    </script>
</body>
</html>
