<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Confe</title>
    
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #cbebff 100%);
            --surface: #ffffff;
            --text: #0f172a;
            --gray: #64748b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .form-box {
            transition: 0.3s ease-in-out;
        }
        
        /* Class để ẩn form */
        .hidden { display: none; }

        .auth-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--gray); margin-bottom: 30px; font-weight: 500; }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; margin-left: 4px; }
        .input-field {
            width: 100%; padding: 14px 16px; border: 2px solid transparent; background: #f1f5f9;
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s; color: var(--text); font-weight: 500;
        }
        .input-field:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-submit {
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.2s; margin-bottom: 15px; margin-top: 10px;
            background: var(--primary); color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .switch-text { font-size: 14px; color: var(--gray); margin-top: 10px; }
        .switch-link { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: none; }
        .switch-link:hover { text-decoration: underline; }

        .error-msg {
            background: #fee2e2; color: #ef4444; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600;
            margin-bottom: 20px; display: none; text-align: left; border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-wrap">
            <img src="assets/favicon.png" alt="Logo" class="logo-img" onerror="this.src='https://placehold.co/100x100?text=C'">
        </div>

        <div id="errorBox" class="error-msg">⚠️ Lỗi rồi!</div>

        <div id="formLogin" class="form-box">
            <h1 class="auth-title">Chào mừng trở lại!</h1>
            <p class="auth-subtitle">Đăng nhập để vào chém gió.</p>

            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" id="lEmail" class="input-field" placeholder="nhap@email.cua.ban">
            </div>
            <div class="input-group">
                <label class="input-label">Mật khẩu</label>
                <input type="password" id="lPass" class="input-field" placeholder="••••••••">
            </div>

            <button id="btnLoginAction" class="btn-submit">Đăng Nhập</button>
            
            <p class="switch-text">
                Chưa có tài khoản? <span class="switch-link" onclick="toggleForm('register')">Đăng ký ngay</span>
            </p>
            <div style="margin-top: 20px;">
                <a href="index.html" style="font-size:13px; color:var(--gray); text-decoration:none;">← Về trang chủ</a>
            </div>
        </div>

        <div id="formRegister" class="form-box hidden">
            <h1 class="auth-title">Tạo tài khoản mới</h1>
            <p class="auth-subtitle">Tham gia cộng đồng ngay hôm nay.</p>

            <div class="input-group">
                <label class="input-label">Email đăng ký</label>
                <input type="email" id="rEmail" class="input-field" placeholder="Email của bạn">
            </div>
            <div class="input-group">
                <label class="input-label">Mật khẩu</label>
                <input type="password" id="rPass" class="input-field" placeholder="Ít nhất 6 ký tự">
            </div>
            <div class="input-group">
                <label class="input-label">Nhập lại mật khẩu</label>
                <input type="password" id="rPassConfirm" class="input-field" placeholder="Nhập lại cho chắc">
            </div>

            <button id="btnRegAction" class="btn-submit">Đăng Ký</button>

            <p class="switch-text">
                Đã có tài khoản rồi? <span class="switch-link" onclick="toggleForm('login')">Đăng nhập</span>
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const cfg = { apiKey: "AIzaSyBPEMno1uZFg4uVXZjz-PbBR37gH6-3t5Y", authDomain: "confe-web.firebaseapp.com", projectId: "confe-web", storageBucket: "confe-web.firebasestorage.app", messagingSenderId: "677778119372", appId: "1:677778119372:web:ee3f1132871332743b0069" };
        const app = initializeApp(cfg);
        const auth = getAuth(app);

        // Hàm chuyển đổi giữa 2 form
        window.toggleForm = (type) => {
            const loginForm = document.getElementById('formLogin');
            const regForm = document.getElementById('formRegister');
            const errBox = document.getElementById('errorBox');
            
            errBox.style.display = 'none'; // Xóa lỗi cũ

            if (type === 'register') {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
            } else {
                regForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
        }

        const showError = (msg) => {
            const box = document.getElementById('errorBox');
            box.style.display = 'block';
            box.textContent = "⚠️ " + msg;
        }

        const setLoading = (btn, isLoading, text) => {
            if(isLoading) {
                btn.disabled = true;
                btn.textContent = "Đang xử lý...";
                btn.style.opacity = "0.7";
            } else {
                btn.disabled = false;
                btn.textContent = text;
                btn.style.opacity = "1";
            }
        }

        // --- XỬ LÝ ĐĂNG NHẬP ---
        document.getElementById('btnLoginAction').onclick = () => {
            const e = document.getElementById('lEmail').value.trim();
            const p = document.getElementById('lPass').value;
            const btn = document.getElementById('btnLoginAction');

            if(!e || !p) return showError('Vui lòng nhập đủ thông tin!');
            
            setLoading(btn, true, "");
            signInWithEmailAndPassword(auth, e, p)
                .then(() => window.location.href='index.html')
                .catch(err => {
                    setLoading(btn, false, "Đăng Nhập");
                    let msg = "Lỗi đăng nhập!";
                    if(err.code === 'auth/invalid-credential') msg = "Email hoặc mật khẩu sai!";
                    if(err.code === 'auth/user-not-found') msg = "Tài khoản không tồn tại!";
                    if(err.code === 'auth/wrong-password') msg = "Sai mật khẩu!";
                    showError(msg);
                });
        };

        // --- XỬ LÝ ĐĂNG KÝ ---
        document.getElementById('btnRegAction').onclick = () => {
            const e = document.getElementById('rEmail').value.trim();
            const p = document.getElementById('rPass').value;
            const pc = document.getElementById('rPassConfirm').value;
            const btn = document.getElementById('btnRegAction');

            if(!e || !p || !pc) return showError('Nhập đầy đủ thông tin đi!');
            if(p.length < 6) return showError('Mật khẩu phải trên 6 ký tự!');
            if(p !== pc) return showError('Mật khẩu nhập lại không khớp!');

            setLoading(btn, true, "");
            createUserWithEmailAndPassword(auth, e, p)
                .then((cred) => { 
                    alert('✅ Đăng ký thành công! Đang chuyển hướng...'); 
                    window.location.href='profile.html?uid=' + cred.user.uid; 
                })
                .catch(err => {
                    setLoading(btn, false, "Đăng Ký");
                    let msg = "Lỗi đăng ký!";
                    if(err.code === 'auth/email-already-in-use') msg = "Email này đã có người dùng!";
                    if(err.code === 'auth/weak-password') msg = "Mật khẩu quá yếu!";
                    if(err.code === 'auth/invalid-email') msg = "Email không hợp lệ!";
                    showError(msg);
                });
        };
    </script>
</body>
</html>
